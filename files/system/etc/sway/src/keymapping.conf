# KEYBIND SET FILE
include ./bind/*.sk

# COMMAND SET FILE
include ./var/cmds.sv

# EXECUTABLES SET FILE
include ./var/calls/defaults.sv
include ./var/calls/custom.sv

# MAIN INTERNAL WINDOW BIND
bindsym {

        # Change window focus: left, right, up or down relative.
        $window_focus_left      $_fc $_l
        $window_focus_right     $_fc $_r
        $window_focus_down      $_fc $_d
        $window_focus_up        $_fc $_u

        # Move focused window to: left, right, up or down relative.
        $window_move_to_left    $_mv $_l
        $window_move_to_right   $_mv $_r
        $window_move_to_down    $_mv $_d
        $window_move_to_up      $_mv $_u

        # Grow and Shrink Width/Height of focused window.
        $window_grow_width      $_rsz $_gr $_wd
        $window_grow_height     $_rsz $_gr $_ht
        $window_shrink_width    $_rsz $_sr $_wd
        $window_shrink_height   $_rsz $_sr $_ht

        # Minimize(scratchpad), kill, maximize(from scratchpad), fullscreen or toggle floating
        # for focused window
        $window_to_scratch      move scratchpad
        $window_to_kill         kill
        $window_show_scratch    $DEFAULT_SCRATCH_GET
        $window_to_fullscreen   fullscreen
        $window_toggle_float    floating toggle


        # Alternate between window modes: stabbed, stacking or toggle split
        $window_mode_toggle   layout toggle all

        # Select split direction for split mode.
        $window_split_toggle  split toggle

}

# MAIN WORKSPACE INTERNAL BIND
bindsym {
        # Go to N workspace.
        $go_to_workspace_1  $_ws 1
        $go_to_workspace_2  $_ws 2
        $go_to_workspace_3  $_ws 3
        $go_to_workspace_4  $_ws 4
        $go_to_workspace_5  $_ws 5
        $go_to_workspace_6  $_ws 6
        $go_to_workspace_7  $_ws 7
        $go_to_workspace_8  $_ws 8
        $go_to_workspace_9  $_ws 9
        $go_to_workspace_10 $_ws 10

        # Move focused window to N workspace.
        $move_window_to_workspace_1     exec $sway $_mv $_wn to $_ws 1
        $move_window_to_workspace_2     exec $sway $_mv $_wn to $_ws 2
        $move_window_to_workspace_3     exec $sway $_mv $_wn to $_ws 3
        $move_window_to_workspace_4     exec $sway $_mv $_wn to $_ws 4
        $move_window_to_workspace_5     exec $sway $_mv $_wn to $_ws 5
        $move_window_to_workspace_6     exec $sway $_mv $_wn to $_ws 6
        $move_window_to_workspace_7     exec $sway $_mv $_wn to $_ws 7
        $move_window_to_workspace_8     exec $sway $_mv $_wn to $_ws 8
        $move_window_to_workspace_9     exec $sway $_mv $_wn to $_ws 9
        $move_window_to_workspace_10    exec $sway $_mv $_wn to $_ws 10

        # Move focused window and go to N workspace.
        $move_window_and_focus_to_workspace_1   exec $sway $_mv $_wn to $_ws 1 && $sway $_ws 1
        $move_window_and_focus_to_workspace_2   exec $sway $_mv $_wn to $_ws 2 && $sway $_ws 2
        $move_window_and_focus_to_workspace_3   exec $sway $_mv $_wn to $_ws 3 && $sway $_ws 3
        $move_window_and_focus_to_workspace_4   exec $sway $_mv $_wn to $_ws 4 && $sway $_ws 4
        $move_window_and_focus_to_workspace_5   exec $sway $_mv $_wn to $_ws 5 && $sway $_ws 5
        $move_window_and_focus_to_workspace_6   exec $sway $_mv $_wn to $_ws 6 && $sway $_ws 6
        $move_window_and_focus_to_workspace_7   exec $sway $_mv $_wn to $_ws 7 && $sway $_ws 7
        $move_window_and_focus_to_workspace_8   exec $sway $_mv $_wn to $_ws 8 && $sway $_ws 8
        $move_window_and_focus_to_workspace_9   exec $sway $_mv $_wn to $_ws 9 && $sway $_ws 9
        $move_window_and_focus_to_workspace_10  exec $sway $_mv $_wn to $_ws 10 && $sway $_ws 10
}

# CORE EXEC BIND
bindsym {

        $call_total_reload              $DEFAULT_RELOAD
        $call_default_term              $DEFAULT_TERM
        $call_default_menu              $DEFAULT_MENU
		$call_default_files 			$DEFAULT_FILES
		$call_default_wallpaper			$DEFAULT_WALLPAPER

        $system_raise_volume            $DEFAULT_VOLUME_RAISE
        $system_lower_volume            $DEFAULT_VOLUME_LOWER
        $system_mute_volume             $DEFAULT_VOLUME_MUTE

        $system_display_light_raise     $DEFAULT_LIGHT_RAISE
        $system_display_light_lower     $DEFAULT_LIGHT_LOWER
        $system_power_options_call      $DEFAULT_POWER_OFF
        $system_full_lock               $DEFAULT_LOCKSCREEN
}


# PRINT OPTION BIND
bindsym {
