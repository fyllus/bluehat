include $BLUEHAT/src/var/paths.sv


# PHASE 1: Base environment setup (Synchronous block)
exec /usr/bin/xdg-user-dirs-update
exec bash $SCRIPTS/sway-session

# PHASE 2: Infrastructure daemons relying on Phase 1 environment variables
exec /usr/libexec/lxqt-policykit-agent

# PHASE 3: System tray synchronization and XDG autostart target initialization
exec python $SCRIPTS/wait-sni-ready && systemctl --user start sway-xdg-autostart.target

# EXTRA PHASE: Hardware and peripherals management (Non-blocking)
exec_always python $SCRIPTS/xkb-locale1 --oneshot

# AUDIT & LIFE-CYCLE PHASE: Manages and cleans up background system daemons
exec_always bash $SCRIPTS/sway-init
exec_always sway-theme --update --sway
exec foot --server

# LEGACY & REFERENCE LAYER: Retained for development purposes
include ./sway.d/*

# FINAL USER LAYER: Evaluates user-defined start scripts at the very end of boot


include $HOME/.config/autostart/*.start
include ./var/paths.sv
