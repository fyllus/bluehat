include ./theme/color.st
include ./theme/define.st
bar {
    swaybar_command swaybar
    status_command i3blocks
    
    tray_output *         
    tray_padding 5        
    icon_theme hicolor

    font pango: $font_family $font_size
    height	 	$bar_height
    position    $bar_position					
    				
    #gaps $window_gap_outer $window_gap_inner 0 $window_gap_inner
            		
    colors {
                
                background $bar_background
                statusline $bar_statusline
                separator  $bar_separator
				
                #----------------- <border>        <background>        <text>
                focused_workspace  $bar_wsf_border $bar_wsf_background $bar_wsf_text 
                active_workspace   $bar_wsa_border $bar_wsa_background $bar_wsa_text
                inactive_workspace $bar_wsi_border $bar_wsi_background $bar_wsi_text 
                urgent_workspace   $bar_wsu_border $bar_wsu_background $bar_wsu_text
     }    

}

#exec noctalia
