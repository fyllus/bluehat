---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: bluehat
# description will be included in the image's metadata
description: bluehat, not red.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/base-main
image-version: latest # latest is also supported if you want new updates ASAP

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  - type: dnf
    repos:
      copr:
        - swayfx/swayfx        
        - tofik/nwg-shell
        - lihaohong/yazi
        - lionheartp/Hyprland 
        - che/zed
      files:        
         - https://rpm.librewolf.net/librewolf-repo.repo
    install:
      packages:
        # Core Dev & Container Stack
        - git
        - podman-compose
        - podman
        - openssh-clients

        # Utilitários de Terminal & CLI
        - micro
        - btop
        - fzf
        - yazi
        - chafa
        - ImageMagick   
        - ffmpegthumbnailer
        - poppler-utils
        - 7zip
        - tar
        - xz
        - unzip

        # Window Manager & Display Server
        - swayfx
        - gtklock
        - xorg-x11-server-Xwayland

        # Ecossistema Visual & GUI Apps
        #- nwg-look
        - nwg-bar
        - zed
        - godot
        - librewolf

        # Fontes Essenciais
        - google-noto-sans-fonts
        - google-noto-fonts-common
        - fontawesome-fonts

        # Core LXQt (Arranque e Serviços)
        - lxqt-policykit
        #- lxqt-session

        # Network & Hardware Management
        - NetworkManager-wifi
        - iw
        - bluez

        # Gráficos e Aceleração Core
        - mesa-dri-drivers
        - mesa-vulkan-drivers
        - mesa-va-drivers

        # Infraestrutura de Áudio (PipeWire)
        - pipewire
        - pipewire-utils
        - pipewire-alsa
        - pipewire-pulseaudio
        - wireplumber

        # Dependências de Runtime do Noctalia Shell
        - sdbus-cpp
        - libqalculate
        - jemalloc
        - noctalia
        - amixer
        - pamixer
        - brightnessctl  
