# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: bluehat
description: Minha distro customizada com SwayFX, Noctalia Shell e base leve LXQt.

base-image: ghcr.io/ublue-os/base-main
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        - swayfx/swayfx        
        - tofik/nwg-shell
        - lihaohong/yazi
        - lionheartp/Hyprland 
        - che/zed
      files:
        - https://repo.librewolf.net/librewolf.repo
    install:
      packages:
        # Core Dev & Container Stack
        - git
        - podman-compose
        - openssh-clients

        # Utilitários de Terminal & CLI
        - micro
        - fzf
        - yazi
        - chafa
        - ImageMagick   
        - ffmpegthumbnailer
        - poppler-utils
        - 7zip
        - tar
        - xz
        - unzip

        # Window Manager & Display Server
        - swayfx
        - xorg-x11-server-Xwayland

        # Ecossistema Visual & GUI Apps
        - nwg-look
        - nwg-bar
        - zed
        - librewolf
        - godot

        # Fontes Essenciais
        - google-noto-sans-fonts
        - google-noto-fonts-common
        - fontawesome-fonts

        # Core LXQt (Arranque e Serviços)
        - lxqt-policykit
        - lxqt-session

        # Network & Hardware Management
        - NetworkManager-wifi
        - iw
        - bluez
        - bluez-utils

        # Gráficos e Aceleração Core
        - mesa-dri-drivers
        - mesa-vulkan-drivers
        - mesa-va-drivers

        # Infraestrutura de Áudio (PipeWire)
        - pipewire
        - pipewire-utils
        - pipewire-alsa
        - pipewire-pulseaudio
        - wireplumber

        # Dependências de Runtime do Noctalia Shell
        - sdbus-cpp
        - libqalculate
        - jemalloc
        - noctalia
        - amixer
        - pamixer
        - brightnessctl  


  - type: signing
