# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: bluehat
description: bluehat, not red.

base-image: ghcr.io/ublue-os/base-main
image-version: latest 

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        - swayfx/swayfx        
        - tofik/nwg-shell
        - lihaohong/yazi
        - lionheartp/Hyprland 
        - che/zed
      files:
        - https://repo.librewolf.net/librewolf.repo
    
    install:
      packages:
        # Core Dev & Container Stack
        - git
        - podman-compose
        - podman
        - openssh-clients

        # Utilitários de Terminal & CLI
        - rofi-wayland
        - j4-dmenu-desktop
        - grim
        - slurp        
        - yazi
        - dunst
        - micro
        - btop
        - fzf
        - chafa
        - ImageMagick   
        - ffmpegthumbnailer
        - poppler-utils
        - 7zip
        - tar
        - i3blocks
        - lm_sensors
        - acpi
        - xz
        - unzip

        # Window Manager & Display Server
        - swayfx
        - gtklock
        - xorg-x11-server-Xwayland

        # Ecossistema Visual & GUI Apps
        - nwg-look
        - nwg-bar
        - steam
        - zed
        - godot
        - librewolf

        # Fontes Essenciais
        - google-noto-sans-fonts
        - google-noto-fonts-common
        - fontawesome-fonts

        # Core LXQt (Arranque e Serviços)
        - lxqt-policykit
        
        # Network & Hardware Management
        - NetworkManager-wifi        
        - iw
        - bluez
               
        # Dependências de Runtime do Noctalia Shell
        # - sdbus-cpp
        # - libqalculate
        # - jemalloc
        # - noctalia
        - amixer
        - pamixer
        - brightnessctl

  
